<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Applyt</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="w-[440px] max-h-[560px] overflow-y-auto m-0 bg-cream text-ink">
    <div class="flex items-baseline justify-between p-4 pb-2.5">
      <div class="flex items-center gap-1.5">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px] text-matcha-400">
          <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
          <path d="M9 12l2 2l4 -4" />
        </svg>
        <h1 class="text-[15px] font-medium m-0 leading-tight text-ink">Applyt</h1>
      </div>
      <a class="text-[12px] text-matcha-600 no-underline hover:underline flex items-center gap-0.5" id="open-dashboard" href="#">
        Dashboard
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5">
          <path d="M17 7l-10 10" />
          <path d="M8 7l9 0l0 9" />
        </svg>
      </a>
    </div>

    <div class="px-4 pb-4">
      <div class="text-[13px] leading-[1.45] text-ink-soft" id="status">Checking this page…</div>

      <div class="bg-white border-[0.5px] border-matcha-200 rounded-xl p-3 mt-3" id="job" hidden>
        <div class="font-medium text-[14px] leading-tight text-ink" id="job-title"></div>
        <div class="text-ink-soft mt-0.5 text-[12px]" id="job-company"></div>
      </div>

      <div id="controls" class="mt-3" hidden>
       <div class="flex flex-col gap-3">
        <label class="flex items-center justify-between cursor-pointer">
          <span class="text-[13px] text-ink">Match rating &amp; justification</span>
          <div class="relative flex items-center">
            <input type="checkbox" id="opt-rating" class="sr-only" checked />
            <div class="toggle-track w-9 h-5 bg-matcha-100 border-[0.5px] border-matcha-200 rounded-full">
              <div class="toggle-thumb absolute top-[2px] left-[2px] w-4 h-4 bg-white rounded-full border-[0.5px] border-matcha-200"></div>
            </div>
          </div>
        </label>
        <label class="flex items-center justify-between cursor-pointer">
          <span class="text-[13px] text-ink">Interview &amp; cover-letter suggestions</span>
          <div class="relative flex items-center">
            <input type="checkbox" id="opt-suggestions" class="sr-only" checked />
            <div class="toggle-track w-9 h-5 bg-matcha-100 border-[0.5px] border-matcha-200 rounded-full">
              <div class="toggle-thumb absolute top-[2px] left-[2px] w-4 h-4 bg-white rounded-full border-[0.5px] border-matcha-200"></div>
            </div>
          </div>
        </label>
        <label class="flex items-center justify-between cursor-pointer">
          <span class="text-[13px] text-ink"
            >Target one page <span class="text-[11px] text-ink-soft block">(may trim less relevant content to fit)</span></span
          >
          <div class="relative flex items-center">
            <input type="checkbox" id="opt-one-page" class="sr-only" />
            <div class="toggle-track w-9 h-5 bg-matcha-100 border-[0.5px] border-matcha-200 rounded-full">
              <div class="toggle-thumb absolute top-[2px] left-[2px] w-4 h-4 bg-white rounded-full border-[0.5px] border-matcha-200"></div>
            </div>
          </div>
        </label>
        <button
          class="bg-matcha-400 hover:bg-matcha-600 text-white border-none rounded-lg py-2.5 mt-0.5 text-[13px] font-medium cursor-pointer w-full transition-colors disabled:opacity-55 disabled:cursor-not-allowed"
          id="tailor-btn"
        >
          Tailor for this job
        </button>
        <p class="m-0 text-ink-soft text-[12px] leading-[1.4]" id="controls-hint" hidden></p>
       </div>
      </div>

      <div id="results" class="mt-3" hidden>
       <div class="flex flex-col gap-3">
        <div class="bg-white border-[0.5px] border-matcha-200 rounded-xl p-3" id="match" hidden>
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[11px] font-medium uppercase tracking-wider text-ink-soft">Match</span>
            <span id="match-stars" class="flex items-center gap-1.5"></span>
          </div>
          <div class="text-[13px] leading-relaxed text-ink" id="match-justification"></div>
        </div>

        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <span class="text-[11px] font-medium uppercase tracking-wider text-ink-soft">Tailored resume</span>
            <div class="flex flex-wrap gap-1.5 justify-end">
              <button class="px-2 py-1 bg-matcha-100 text-matcha-800 text-[11px] font-medium rounded-lg hover:bg-matcha-200 transition-colors" id="copy-btn">
                Copy
              </button>
              <button class="px-2 py-1 bg-matcha-100 text-matcha-800 text-[11px] font-medium rounded-lg hover:bg-matcha-200 transition-colors flex items-center gap-1" id="download-pdf-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M5 12v-7a2 2 0 0 1 2 -2h7l5 5v4" /><path d="M5 18h1.5a1.5 1.5 0 0 0 0 -3h-1.5v6" /><path d="M17 18h2" /><path d="M20 15h-3v6" /><path d="M11 15v6h1a2 2 0 0 0 2 -2v-2a2 2 0 0 0 -2 -2h-1" />
                </svg>
                PDF
              </button>
              <button class="px-2 py-1 bg-matcha-100 text-matcha-800 text-[11px] font-medium rounded-lg hover:bg-matcha-200 transition-colors flex items-center gap-1" id="download-docx-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M5 12v-7a2 2 0 0 1 2 -2h7l5 5v4" /><path d="M2 15v6h1a2 2 0 0 0 2 -2v-2a2 2 0 0 0 -2 -2h-1" /><path d="M17 16.5a1.5 1.5 0 0 0 -3 0v3a1.5 1.5 0 0 0 3 0" /><path d="M9.5 15a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1 -3 0v-3a1.5 1.5 0 0 1 1.5 -1.5" /><path d="M19.5 15l3 6" /><path d="M19.5 21l3 -6" />
                </svg>
                Word
              </button>
              <button class="px-2 py-1 bg-matcha-100 text-matcha-800 text-[11px] font-medium rounded-lg hover:bg-matcha-200 transition-colors flex items-center gap-1" id="download-txt-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2" /><path d="M9 9l1 0" /><path d="M9 13l6 0" /><path d="M9 17l6 0" />
                </svg>
                TXT
              </button>
            </div>
          </div>
          <textarea
            id="resume"
            readonly
            rows="12"
            class="w-full bg-matcha-50/40 border-[0.5px] border-matcha-200 rounded-lg p-2.5 text-[12px] font-mono leading-relaxed resize-y focus:outline-none"
          ></textarea>
        </div>

        <div class="bg-white border-[0.5px] border-matcha-200 rounded-xl p-3" id="suggestions" hidden>
          <span class="text-[11px] font-medium uppercase tracking-wider text-ink-soft block mb-1.5">Interview &amp; cover-letter suggestions</span>
          <div class="text-[13px] leading-relaxed text-ink whitespace-pre-wrap" id="suggestions-body"></div>
        </div>

        <p class="m-0 text-[11px] text-ink-soft pt-2 border-t border-matcha-200" id="usage"></p>
       </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
