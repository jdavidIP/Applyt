server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA client-side routing: fall back to index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend service. The trailing slash on proxy_pass
  # strips the "/api" prefix, mirroring the Vite dev proxy's rewrite
  # (/api/applications -> backend /applications).
  location /api/ {
    proxy_pass http://backend:4317/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
